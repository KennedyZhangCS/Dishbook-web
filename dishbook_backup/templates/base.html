<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Dishbook{% endblock %}</title>
    <link rel="stylesheet" href="/static/main.css">
</head>
    <body>
        <div class="top">
        <div><a href="/">Dishbook</a></div>
        <div>
            {% if user.is_authenticated %}

                <a href="/logout">Sign out</a>

            {% endif %}
        </div>
    </div>
    
    </body>

</html>
