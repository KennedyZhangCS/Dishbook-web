<div class="recipe-box">
    <h3><a href="/recipe/{{ recipe.id }}/">{{ recipe.title }}</a></h3>

    {% if recipe.photo %}
        <img src="{{ recipe.photo.url }}" alt="Photo of {{ recipe.title }}">
    {% endif %}

    <p>{{ recipe.description|truncatewords:16 }}</p>

    <p>
        {% for tag in recipe.tags.all %}
            <span>{{ tag.name }}</span>
        {% endfor %}
    </p>
</div>
