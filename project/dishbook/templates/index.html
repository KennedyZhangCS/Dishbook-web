{% extends "base.html" %}

{% block title %}Dishbook Home{% endblock %}

{% block content %}
<h1>Welcome to Dishbook</h1>
<p>Browse recipes shared by our community.</p>

<div class="recipes-list">
    {% for recipe in recipes %}
        {% include "recipe_card.html" with recipe=recipe %}
    {% empty %}
        <p>No recipes yet.</p>
    {% endfor %}
</div>
{% endblock %}
